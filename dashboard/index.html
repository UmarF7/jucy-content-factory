<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JUCY CLEANSE — Content Review Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a472a 0%, #0f2818 100%);
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #7eff9f;
    }
    
    .subtitle {
      color: #a0d8a0;
      font-size: 1rem;
    }
    
    .date-info {
      margin-top: 20px;
      padding: 15px;
      background: rgba(126, 255, 159, 0.1);
      border-left: 4px solid #7eff9f;
      border-radius: 6px;
    }
    
    .scripts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .script-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #7eff9f;
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .script-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(126, 255, 159, 0.1);
    }
    
    .script-card.approved {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.05);
    }
    
    .script-card.rejected {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.05);
    }
    
    .script-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }
    
    .script-type {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(126, 255, 159, 0.2);
      border-radius: 20px;
      font-size: 0.85rem;
      color: #7eff9f;
      font-weight: 600;
    }
    
    .script-status {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
    }
    
    .script-status.approved {
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
    }
    
    .script-status.rejected {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    
    .script-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
    }
    
    .script-hook {
      font-size: 0.95rem;
      color: #d1d5db;
      font-style: italic;
      margin-bottom: 15px;
      padding-left: 15px;
      border-left: 3px solid #7eff9f;
    }
    
    .script-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #9ca3af;
      margin-bottom: 15px;
    }
    
    .engagement-badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(126, 255, 159, 0.15);
      border-radius: 20px;
      color: #7eff9f;
      font-weight: 600;
    }
    
    .script-details {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    
    .details-label {
      color: #a0d8a0;
      font-weight: 600;
      margin-bottom: 5px;
    }
    
    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }
    
    .hashtag {
      padding: 4px 12px;
      background: rgba(126, 255, 159, 0.1);
      border: 1px solid #7eff9f;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #7eff9f;
    }
    
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    
    .btn-approve {
      background: #4ade80;
      color: #1a2e1b;
    }
    
    .btn-approve:hover {
      background: #22c55e;
      transform: translateY(-2px);
    }
    
    .btn-reject {
      background: #ef4444;
      color: #fff;
    }
    
    .btn-reject:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }
    
    .btn-preview {
      background: #3b82f6;
      color: #fff;
    }
    
    .btn-preview:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }
    
    .btn-edit {
      background: #8b5cf6;
      color: #fff;
    }
    
    .btn-edit:hover {
      background: #7c3aed;
      transform: translateY(-2px);
    }
    
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }
    
    .summary-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #7eff9f;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .summary-value {
      font-size: 2rem;
      font-weight: bold;
      color: #7eff9f;
      margin: 10px 0;
    }
    
    .summary-label {
      color: #a0d8a0;
      font-size: 0.9rem;
    }
    
    .footer {
      text-align: center;
      color: #6b7280;
      padding: 20px 0;
      margin-top: 40px;
      border-top: 1px solid rgba(126, 255, 159, 0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌿 JUCY CLEANSE</h1>
      <h2 class="subtitle">Daily Content Review Dashboard</h2>
      <div class="date-info">
        <strong>Today's Scripts:</strong> <span id="date-display">Loading...</span>
        <span id="status-display">Awaiting review</span>
      </div>
    </header>

    <div class="summary" id="summary">
      <div class="summary-card">
        <div class="summary-label">Total Scripts</div>
        <div class="summary-value" id="total-scripts">5</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Approved</div>
        <div class="summary-value" id="approved-count">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Pending Review</div>
        <div class="summary-value" id="pending-count">5</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Rejected</div>
        <div class="summary-value" id="rejected-count">0</div>
      </div>
    </div>

    <div class="scripts-grid" id="scripts-container">
      <!-- Scripts will load here -->
    </div>

    <div class="footer">
      <p>💚 JUCY CLEANSE Content Factory | Review and approve before publishing</p>
    </div>
  </div>

  <script>
    // Load scripts from generated JSON
    async function loadScripts() {
      const today = new Date().toISOString().split('T')[0];
      try {
        const response = await fetch(`../output/scripts-${today}.json`);
        const data = await response.json();
        
        document.getElementById('date-display').textContent = today;
        document.getElementById('total-scripts').textContent = data.scripts.length;
        
        renderScripts(data.scripts);
      } catch (error) {
        console.log('Scripts not loaded yet. Showing demo...');
        renderDemoScripts();
      }
    }

    function renderScripts(scripts) {
      const container = document.getElementById('scripts-container');
      container.innerHTML = '';
      
      scripts.forEach((script, index) => {
        const card = createScriptCard(script, index);
        container.appendChild(card);
      });
    }

    function createScriptCard(script, index) {
      const card = document.createElement('div');
      card.className = 'script-card';
      card.id = `script-${index}`;
      
      const hashtags = script.hashtags.map(tag => `<span class="hashtag">${tag}</span>`).join('');
      
      card.innerHTML = `
        <div class="script-header">
          <div>
            <span class="script-type">${script.template.replace(/_/g, ' ').toUpperCase()}</span>
          </div>
          <span class="script-status" id="status-${index}">Pending</span>
        </div>
        
        <h3 class="script-title">${script.title}</h3>
        
        <div class="script-hook">"${script.hook}"</div>
        
        <div class="script-meta">
          <span>⏱️ ${script.length}</span>
          <span class="engagement-badge">📊 ${script.estimated_engagement}</span>
        </div>
        
        <div class="script-details">
          <div class="details-label">📝 Caption</div>
          <p>${script.caption.replace(/\n/g, '<br>')}</p>
        </div>
        
        <div>
          <div class="details-label">🏷️ Hashtags</div>
          <div class="hashtags">${hashtags}</div>
        </div>
        
        <div class="actions">
          <button class="btn-approve" onclick="approveScript(${index})">✓ Approve</button>
          <button class="btn-reject" onclick="rejectScript(${index})">✗ Reject</button>
          <button class="btn-edit" onclick="editScript(${index})">✎ Edit</button>
        </div>
      `;
      
      return card;
    }

    function approveScript(index) {
      const card = document.getElementById(`script-${index}`);
      card.classList.add('approved');
      document.getElementById(`status-${index}`).textContent = 'Approved';
      document.getElementById(`status-${index}`).className = 'script-status approved';
      updateSummary();
    }

    function rejectScript(index) {
      const card = document.getElementById(`script-${index}`);
      card.classList.add('rejected');
      document.getElementById(`status-${index}`).textContent = 'Rejected';
      document.getElementById(`status-${index}`).className = 'script-status rejected';
      updateSummary();
    }

    function editScript(index) {
      alert('Edit functionality would open a modal to modify the script');
    }

    function updateSummary() {
      const approved = document.querySelectorAll('.script-card.approved').length;
      const rejected = document.querySelectorAll('.script-card.rejected').length;
      const pending = 5 - approved - rejected;
      
      document.getElementById('approved-count').textContent = approved;
      document.getElementById('rejected-count').textContent = rejected;
      document.getElementById('pending-count').textContent = pending;
    }

    function renderDemoScripts() {
      const demoScripts = [
        { template: 'problem_solution', title: 'Problem → Solution: Bloating', hook: 'If you\'re constantly bloated...', length: '20s', estimated_engagement: 'high', caption: 'Real caption here', hashtags: ['#JuicyCleanse', '#Detox'] },
        { template: 'testimonial', title: 'Day 3 Results', hook: 'Day 3 and here\'s what happened...', length: '18s', estimated_engagement: 'very high', caption: 'Testimonial caption', hashtags: ['#RealResults', '#Cleanse'] },
        { template: 'benefits_breakdown', title: 'Why Cold-Pressed Works', hook: 'Here\'s exactly why...', length: '20s', estimated_engagement: 'high', caption: 'Educational caption', hashtags: ['#Science', '#Nutrition'] },
        { template: 'objection_handler', title: 'Will I be hungry?', hook: 'Is it safe?', length: '20s', estimated_engagement: 'medium-high', caption: 'FAQ caption', hashtags: ['#FAQ', '#Trust'] },
        { template: 'lifestyle_identity', title: 'Morning routine', hook: 'POV: You take health seriously...', length: '20s', estimated_engagement: 'high', caption: 'Lifestyle caption', hashtags: ['#Wellness', '#Routine'] }
      ];
      
      renderScripts(demoScripts);
    }

    // Load on page load
    loadScripts();
  </script>
</body>
</html>
